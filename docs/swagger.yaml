definitions:
  domain.HealthStatusEnum:
    enum:
    - ok
    - error
    type: string
    x-enum-varnames:
    - HealthStatusValueOk
    - HealthStatusValueError
  listopts.PaginationResponse:
    properties:
      page:
        example: 1
        type: integer
      page_size:
        example: 10
        type: integer
      total_count:
        example: 100
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  nethttp.ErrorResponse:
    properties:
      message:
        example: internal server error
        type: string
    type: object
  ports.CreateEventRequest:
    properties:
      content:
        example: My important event content
        type: string
      title:
        example: My event title
        type: string
    type: object
  ports.EventResponse:
    properties:
      archived_at:
        example: "2026-02-08T10:30:00Z"
        type: string
      content:
        example: My important event content
        type: string
      created_at:
        example: "2026-02-08T10:30:00Z"
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
      owner_user_id:
        example: 507f1f77bcf86cd799439011
        type: string
      title:
        example: My event title
        type: string
      updated_at:
        example: "2026-02-08T10:30:00Z"
        type: string
    type: object
  ports.ForgotPasswordRequest:
    properties:
      email:
        example: user@example.com
        type: string
    type: object
  ports.ListEventsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/ports.EventResponse'
        type: array
      pagination:
        $ref: '#/definitions/listopts.PaginationResponse'
    type: object
  ports.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: ValidPass123!
        type: string
    type: object
  ports.LoginResponse:
    properties:
      refresh_token:
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  ports.LogoutRequest:
    properties:
      refresh_token:
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        type: string
    type: object
  ports.RefreshRequest:
    properties:
      refresh_token:
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        type: string
    type: object
  ports.RefreshResponse:
    properties:
      refresh_token:
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  ports.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: ValidPass123!
        type: string
    type: object
  ports.RegisterResponse:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
    type: object
  ports.ResetPasswordRequest:
    properties:
      password:
        example: NewPass123!
        type: string
      token:
        example: abc123...
        type: string
    type: object
  ports.UpdateEventRequest:
    properties:
      content:
        example: My updated event content
        type: string
      title:
        example: My updated event title
        type: string
    type: object
  response.HealthResponse:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/domain.HealthStatusEnum'
        example: ok
    type: object
info:
  contact:
    email: support@momento.com
    name: API Support
  description: API documentation for Momento application
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Momento API
  version: "1.0"
paths:
  /api/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset email if the account exists
      parameters:
      - description: Password reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email sent
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Request password reset
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT token and a refresh token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/ports.LoginResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Login with email and password
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the refresh token to log out the user
      parameters:
      - description: Logout request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.LogoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Logout successful
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Logout user
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for a new JWT token and a new refresh
        token
      parameters:
      - description: Refresh request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens refreshed successfully
          schema:
            $ref: '#/definitions/ports.RefreshResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/ports.RegisterResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using a valid reset token
      parameters:
      - description: Reset password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successful
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid token or password
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "410":
          description: Token expired
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Reset password with token
      tags:
      - auth
  /api/auth/reset-password/validate:
    get:
      consumes:
      - application/json
      description: Checks if a reset token is valid and not expired
      parameters:
      - description: Reset token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token is valid
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Invalid token
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "410":
          description: Token expired
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      summary: Validate reset token
      tags:
      - auth
  /api/events:
    get:
      consumes:
      - application/json
      description: Retrieves a paginated list of events for the authenticated user
        with sorting options
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 10
        description: 'Page size (default: 10, max: 100)'
        in: query
        name: page_size
        type: integer
      - default: created_at
        description: 'Sort field: created_at, updated_at (default: created_at)'
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 'Sort order: asc, desc (default: desc)'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ports.ListEventsResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: List user events
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Creates a new event associated with the authenticated user
      parameters:
      - description: Event content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ports.EventResponse'
        "400":
          description: Invalid content
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Create a new event
      tags:
      - events
  /api/events/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a event belonging to the authenticated user
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Delete a event
      tags:
      - events
    get:
      consumes:
      - application/json
      description: Retrieves a specific event for the authenticated user by event
        ID
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ports.EventResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Retrieve a event by ID
      tags:
      - events
    patch:
      consumes:
      - application/json
      description: Updates the content of a event for the authenticated user
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated event content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ports.UpdateEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ports.EventResponse'
        "400":
          description: Invalid content
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Update a event
      tags:
      - events
  /api/events/{id}/archive:
    patch:
      consumes:
      - application/json
      description: Archives a event belonging to the authenticated user
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Archive a event
      tags:
      - events
  /api/events/{id}/restore:
    patch:
      consumes:
      - application/json
      description: Restores a event belonging to the authenticated user
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/nethttp.ErrorResponse'
      security:
      - Bearer: []
      summary: Restore a event
      tags:
      - events
  /api/healthcheck:
    get:
      consumes:
      - application/json
      description: Returns the health status of the application and database connection
      produces:
      - application/json
      responses:
        "200":
          description: Health status response
          schema:
            $ref: '#/definitions/response.HealthResponse'
        "503":
          description: Health status response
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Health check endpoint
      tags:
      - health
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

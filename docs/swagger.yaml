definitions:
  domain.HealthStatusEnum:
    enum:
    - ok
    - error
    type: string
    x-enum-varnames:
    - HealthStatusValueOk
    - HealthStatusValueError
  internal_auth_presentation.ErrorResponse:
    properties:
      message:
        example: user already exists
        type: string
    type: object
  internal_notes_presentation.ErrorResponse:
    properties:
      message:
        example: invalid note content
        type: string
    type: object
  presentation.CreateNoteRequest:
    properties:
      content:
        example: My important note content
        type: string
    type: object
  presentation.HealthResponse:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/domain.HealthStatusEnum'
        example: ok
    type: object
  presentation.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: ValidPass123!
        type: string
    required:
    - email
    - password
    type: object
  presentation.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  presentation.NoteResponse:
    properties:
      content:
        example: My important note content
        type: string
      created_at:
        example: "2026-02-08T10:30:00Z"
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
      updated_at:
        example: "2026-02-08T10:30:00Z"
        type: string
      user_id:
        example: 507f1f77bcf86cd799439011
        type: string
    type: object
  presentation.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: ValidPass123!
        type: string
    required:
    - email
    - password
    type: object
  presentation.RegisterResponse:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
    type: object
info:
  contact:
    email: support@pinnado.com
    name: API Support
  description: API documentation for Pinnado application
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Pinnado API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password credentials
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presentation.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/presentation.LoginResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
      summary: Login with email and password
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presentation.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/presentation.RegisterResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_auth_presentation.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/healthcheck:
    get:
      consumes:
      - application/json
      description: Returns the health status of the application and database connection
      produces:
      - application/json
      responses:
        "200":
          description: Health status response
          schema:
            $ref: '#/definitions/presentation.HealthResponse'
        "503":
          description: Health status response
          schema:
            $ref: '#/definitions/presentation.HealthResponse'
      summary: Health check endpoint
      tags:
      - health
  /api/notes:
    post:
      consumes:
      - application/json
      description: Creates a new note associated with the authenticated user
      parameters:
      - description: Note content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presentation.CreateNoteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presentation.NoteResponse'
        "400":
          description: Invalid content
          schema:
            $ref: '#/definitions/internal_notes_presentation.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_notes_presentation.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_notes_presentation.ErrorResponse'
      security:
      - Bearer: []
      summary: Create a new note
      tags:
      - notes
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
